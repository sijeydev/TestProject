name: Build Kivy APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system deps
      run: |
        sudo apt update
        sudo apt install -y git wget unzip python3-pip \
          autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev cmake \
          libffi-dev libssl-dev libtinfo5

    - name: Install Python deps
      run: |
        pip install --user cython virtualenv
        pip install --user python-for-android

    - name: Setup Android SDK
      run: |
        cd ~
        # Чистая установка
        rm -rf ~/android-sdk
        rm -rf ~/cmdline-tools
        
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -o commandlinetools-linux-11076708_latest.zip
        
        mkdir -p android-sdk/cmdline-tools
        mv cmdline-tools android-sdk/cmdline-tools/latest
        
        SDK_PATH=$(realpath ~/android-sdk)
        echo "SDK_PATH=$SDK_PATH" >> $GITHUB_ENV
        
        # Принимаем лицензии
        yes | ~/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        
        # Ставим компоненты
        ~/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" \
                   "build-tools;33.0.2" \
                   "ndk;25.2.9519653" \
                   "platform-tools"
        
        # Сохраняем переменные
        echo "ANDROIDSDK=$SDK_PATH" >> $GITHUB_ENV
        echo "ANDROIDNDK=$SDK_PATH/ndk/25.2.9519653" >> $GITHUB_ENV
        echo "$SDK_PATH/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$SDK_PATH/platform-tools" >> $GITHUB_PATH

    - name: Build APK
      run: |
        # КОСТЫЛЬ С АБСОЛЮТНЫМ ПУТЕМ
        mkdir -p $ANDROIDSDK/tools/bin
        ln -sf $ANDROIDSDK/cmdline-tools/latest/bin/sdkmanager $ANDROIDSDK/tools/bin/sdkmanager
        ln -sf $ANDROIDSDK/cmdline-tools/latest/bin/avdmanager $ANDROIDSDK/tools/bin/avdmanager
        
        # Проверка
        echo "=== ФИНАЛЬНАЯ ПРОВЕРКА ==="
        ls -la $ANDROIDSDK/tools/bin/
        echo "=== АБСОЛЮТНЫЙ ПУТЬ ==="
        readlink -f $ANDROIDSDK/tools/bin/sdkmanager
        
        # Чистим кэш
        rm -rf ~/.local/share/python-for-android/build/
        rm -rf ~/.local/share/python-for-android/dists/
        
        # Сборка
        p4a apk --private . \
          --package=org.example.myapp \
          --name "My App" \
          --version 0.1 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy \
          --arch=arm64-v8a \
          --release \
          --ndk-dir=$ANDROIDNDK \
          --sdk-dir=$ANDROIDSDK \
          --android-api=33 \
          --minsdk=21 \
          --color=always \
          --sdk-manager-path=$ANDROIDSDK/tools/bin/sdkmanager

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: bin/*.apk

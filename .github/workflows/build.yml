name: Build Kivy APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git wget unzip \
          python3-pip python3-venv \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev \
          libtinfo5

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --user cython virtualenv
        pip install --user python-for-android

    # ВАЖНО: Сначала создаём папки
    - name: Create SDK directories
      run: |
        mkdir -p ${{ github.workspace }}/sdk
        mkdir -p ${{ github.workspace }}/ndk

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708
        ndk-version: 26.3.11579264
        ndk-install-path: ${{ github.workspace }}/ndk
        sdk-install-path: ${{ github.workspace }}/sdk

    # НОВО: Качаем платформы через sdkmanager
    - name: Install Android SDK platforms
      run: |
        export PATH=$PATH:${{ github.workspace }}/sdk/cmdline-tools/latest/bin
        # Ищем sdkmanager
        SDKMANAGER=$(find ${{ github.workspace }}/sdk -name "sdkmanager" | head -n 1)
        
        if [ -z "$SDKMANAGER" ]; then
          echo "sdkmanager not found!"
          exit 1
        fi
        
        # Принимаем лицензии
        yes | $SDKMANAGER --licenses
        
        # Ставим нужные платформы
        $SDKMANAGER "platforms;android-33" "build-tools;33.0.2" "platform-tools"
        
        # Добавляем в PATH папку platform-tools (для adb и т.д.)
        PLATFORM_TOOLS=$(find ${{ github.workspace }}/sdk -type d -name "platform-tools" | head -n 1)
        if [ -n "$PLATFORM_TOOLS" ]; then
          echo "$PLATFORM_TOOLS" >> $GITHUB_PATH
        fi

    # Добавляем cmdline-tools в PATH
    - name: Add Android tools to PATH
      run: |
        CMDLINE_TOOLS_BIN=$(find ${{ github.workspace }}/sdk -type d -path "*/cmdline-tools/*/bin" | head -n 1)
        if [ -n "$CMDLINE_TOOLS_BIN" ]; then
          echo "Found tools in: $CMDLINE_TOOLS_BIN"
          echo "$CMDLINE_TOOLS_BIN" >> $GITHUB_PATH
        else
          echo "::error::Could not find cmdline-tools/bin!"
          exit 1
        fi

    - name: Build APK with python-for-android
      env:
        ANDROIDSDK: ${{ github.workspace }}/sdk
        ANDROIDNDK: ${{ github.workspace }}/ndk
        ANDROIDAPI: 33
        NDKAPI: 21
      run: |
        p4a apk --private . \
          --package=org.example.myapp \
          --name "My Kivy App" \
          --version 0.1 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy,plyer,pyjnius,android \
          --arch=arm64-v8a \
          --arch=armeabi-v7a \
          --release \
          --ndk-dir=$ANDROIDNDK \
          --sdk-dir=$ANDROIDSDK \
          --android-api=$ANDROIDAPI \
          --minsdk=$NDKAPI \
          --color=always \
          --enable=sqlite3 \
          --copy-libs \
          --verbose

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: kivy-app-apk
        path: bin/*.apk
        if-no-files-found: error
        retention-days: 30

name: Build Kivy APK (Docker Buildozer)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install only necessary system deps (no Python)
        run: |
          apt-get update
          # Устанавливаем только то, чего точно не хватает
          apt-get install -y --no-install-recommends \
            python3-pip \
            python3-venv \
            python3-dev \
            || true

      - name: Setup Python 3.8 via deadsnakes PPA
        run: |
          apt-get update
          apt-get install -y software-properties-common
          add-apt-repository ppa:deadsnakes/ppa -y
          apt-get update
          apt-get install -y python3.8 python3.8-dev python3.8-venv python3.8-distutils
          update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.8 1
          python3 --version
          python3 -m ensurepip --upgrade

      - name: Build with Buildozer
        run: |
          cd $GITHUB_WORKSPACE
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          sed -i 's/requirements = .*/requirements = python3,kivy==2.1.0/g' buildozer.spec
          sed -i 's/android.ndk = .*/android.ndk = 25b/g' buildozer.spec
          sed -i 's/android.sdk = .*/android.sdk = 33/g' buildozer.spec
          sed -i 's/android.build_tools_version = .*/android.build_tools_version = 33.0.2/g' buildozer.spec
          sed -i 's/android.archs = .*/android.archs = arm64-v8a/g' buildozer.spec
          # Пробуем собрать без жёсткой фиксации версии Python
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: myapp-apk
          path: ./bin/*.apk

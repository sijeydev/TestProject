name: Build Kivy APK

on:
  push:
    branches: [ "main" ]   # или твоя основная ветка
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:       # возможность запустить вручную

jobs:
  build:
    runs-on: ubuntu-22.04   # в 2026 это будет 24.04 или новее

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'  # или 3.12, проверь совместимость зависимостей

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'   # Eclipse Temurin (рекомендуется)
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git \
          wget \
          unzip \
          python3-pip \
          python3-venv \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --user cython virtualenv
        pip install --user python-for-android   # установка p4a

    - name: Setup Android SDK and NDK
      uses: android-actions/setup-android@v3
      with:
        # GitHub рекомендует указывать версии явно для воспроизводимости
        cmdline-tools-version: 11076708  # актуальная версия 2025-2026
        ndk-version: 26.3.11579264       # последняя стабильная NDK r26
        ndk-install-path: ${{ github.workspace }}/ndk
        sdk-install-path: ${{ github.workspace }}/sdk

    - name: Build APK with python-for-android
      env:
        # Указываем p4a, где искать SDK и NDK
        ANDROIDSDK: ${{ github.workspace }}/sdk
        ANDROIDNDK: ${{ github.workspace }}/ndk
        ANDROIDAPI: 33                     # целевая Android API (Android 13)
        NDKAPI: 21                          # минимальная поддерживаемая API
      run: |
        # Создаём дистрибутив и собираем APK
        p4a apk --private . \
          --package=org.example.myapp \
          --name "My Kivy App" \
          --version 0.1 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy,plyer,pyjnius,android \
          --arch=arm64-v8a \
          --arch=armeabi-v7a \
          --release \
          --ndk-dir=$ANDROIDNDK \
          --sdk-dir=$ANDROIDSDK \
          --android-api=$ANDROIDAPI \
          --minsdk=$NDKAPI \
          --color=always \
          --enable=sqlite3 \
          --copy-libs \
          --verbose

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: kivy-app-apk
        path: bin/*.apk
        if-no-files-found: error
        retention-days: 30

name: Build Kivy APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'   # <-- КЛЮЧЕВОЙ МОМЕНТ: 3.9 а не 3.11

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system deps
      run: |
        sudo apt update
        sudo apt install -y git wget unzip python3-pip \
          autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev cmake \
          libffi-dev libssl-dev libtinfo5

    - name: Install Python deps
      run: |
        pip install --user cython virtualenv
        pip install --user python-for-android

    - name: Setup Android SDK
      run: |
        cd ~
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip
        mkdir -p android-sdk/cmdline-tools
        mv cmdline-tools android-sdk/cmdline-tools/latest
        export PATH=$PATH:~/android-sdk/cmdline-tools/latest/bin
        
        yes | sdkmanager --licenses
        sdkmanager "ndk;25.2.9519653" \
                   "platforms;android-33" \
                   "build-tools;33.0.2"
        
        echo "ANDROIDSDK=~/android-sdk" >> $GITHUB_ENV
        echo "ANDROIDNDK=~/android-sdk/ndk/25.2.9519653" >> $GITHUB_ENV
        echo "~/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

    - name: Build APK
      run: |
        p4a apk --private . \
          --package=org.example.myapp \
          --name "My App" \
          --version 0.1 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy \
          --arch=arm64-v8a \
          --release \
          --ndk-dir=$ANDROIDNDK \
          --sdk-dir=$ANDROIDSDK \
          --android-api=33 \
          --minsdk=21 \
          --color=always

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: bin/*.apk

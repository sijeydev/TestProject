name: Build Kivy APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git wget unzip python3-pip \
          autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev cmake \
          libffi-dev libssl-dev libtinfo5
        
        pip install --user --upgrade pip
        pip install --user cython virtualenv
        pip install --user buildozer

    - name: Build with Buildozer
      run: |
        # Создаём spec файл если его нет
        if [ ! -f buildozer.spec ]; then
          buildozer init
          # Меняем настройки
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy/g' buildozer.spec
          sed -i 's/android.ndk = .*/android.ndk = 25b/g' buildozer.spec
          sed -i 's/android.sdk = .*/android.sdk = 33/g' buildozer.spec
        fi
        
        # Собираем
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: bin/*.apk

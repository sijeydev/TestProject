name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Устанавливаем зависимости
      run: |
        sudo apt update
        sudo apt install -y git wget unzip python3-pip \
          autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev cmake \
          libffi-dev libssl-dev libtinfo5

    - name: Ставим p4a
      run: |
        pip install --user --upgrade pip
        pip install --user cython virtualenv
        pip install --user python-for-android

    - name: Качаем SDK и NDK руками
      run: |
        cd ~
        mkdir -p android-sdk
        cd android-sdk
        
        # SDK
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        rm -rf cmdline-tools/latest
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
        mv cmdline-tools cmdline-tools/latest 2>/dev/null || true
        
        # NDK
        wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
        unzip -q android-ndk-r25b-linux.zip
        
        # Пути
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "ANDROIDSDK=$HOME/android-sdk" >> $GITHUB_ENV
        echo "ANDROIDNDK=$HOME/android-sdk/android-ndk-r25b" >> $GITHUB_ENV

    - name: Принимаем лицензии и ставим платформы
      run: |
        export PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin
        yes | sdkmanager --licenses --sdk_root=$HOME/android-sdk
        sdkmanager "platforms;android-33" "build-tools;33.0.2" --sdk_root=$HOME/android-sdk

    - name: Сборка
      run: |
        rm -rf ~/.local/share/python-for-android
        
        p4a apk --private . \
          --package=com.example.myapp \
          --name "My App" \
          --version 0.1 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy \
          --arch=arm64-v8a \
          --release \
          --ndk-dir=$ANDROIDNDK \
          --sdk-dir=$ANDROIDSDK \
          --android-api=33 \
          --minsdk=21

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: bin/*.apk

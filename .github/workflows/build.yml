name: Build Kivy APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Удаляем глобальный NDK
      run: |
        sudo rm -rf /usr/local/lib/android/sdk/ndk
        sudo rm -rf /usr/local/lib/android/sdk/ndk-bundle

    - name: Ставим p4a
      run: |
        pip install --user --upgrade pip
        pip install --user cython virtualenv
        pip install --user python-for-android

    - name: Качаем SDK и NDK
      run: |
        mkdir -p ~/android-sdk
        cd ~/android-sdk
        
        # SDK tools
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        
        # Правильная структура: создаём latest и перемещаем
        mkdir -p cmdline-tools
        mv cmdline-tools cmdline-tools/latest 2>/dev/null || true
        mv cmdline-tools cmdline-tools/latest 2>/dev/null || true
        
        # NDK
        wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
        unzip -q android-ndk-r25b-linux.zip

    - name: Принимаем лицензии
      run: |
        export PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin
        yes | sdkmanager --licenses --sdk_root=$HOME/android-sdk

    - name: Ставим платформы
      run: |
        export PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin
        sdkmanager "platforms;android-33" "build-tools;33.0.2" --sdk_root=$HOME/android-sdk

    - name: Сборка APK
      env:
        ANDROIDSDK: /home/runner/android-sdk
        ANDROIDNDK: /home/runner/android-sdk/android-ndk-r25b
      run: |
        export PATH=$PATH:/home/runner/android-sdk/cmdline-tools/latest/bin
        rm -rf ~/.local/share/python-for-android/build/
        rm -rf ~/.local/share/python-for-android/dists/
        
        p4a apk --private . \
          --package=org.example.myapp \
          --name "My App" \
          --version 0.1 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy \
          --arch=arm64-v8a \
          --release \
          --ndk-dir=$ANDROIDNDK \
          --sdk-dir=$ANDROIDSDK \
          --android-api=33 \
          --minsdk=21

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: bin/*.apk

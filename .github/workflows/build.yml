name: Build Kivy APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # Используем 22.04 - там всё есть из коробки

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git wget unzip \
          python3-pip python3-venv \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev \
          libtinfo5  # В 22.04 этот пакет есть в репах!

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --user cython virtualenv
        pip install --user python-for-android

    - name: Setup Android SDK and NDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 12266719  # tools version 16.0
        ndk-version: 26.3.11579264
        ndk-install-path: ${{ github.workspace }}/ndk
        sdk-install-path: ${{ github.workspace }}/sdk

    - name: Add sdkmanager to PATH
      run: |
        SDK_ROOT="${{ github.workspace }}/sdk"
        CMDLINE_TOOLS_PATH=$(find "$SDK_ROOT" -type d -path "*/cmdline-tools/*/bin" | head -n 1)
        
        if [ -n "$CMDLINE_TOOLS_PATH" ]; then
          echo "Found sdkmanager in: $CMDLINE_TOOLS_PATH"
          echo "$CMDLINE_TOOLS_PATH" >> $GITHUB_PATH
        else
          echo "::error::Could not find cmdline-tools/bin folder!"
          exit 1
        fi

    - name: Build APK with python-for-android
      env:
        ANDROIDSDK: ${{ github.workspace }}/sdk
        ANDROIDNDK: ${{ github.workspace }}/ndk
        ANDROIDAPI: 33
        NDKAPI: 21
      run: |
        p4a apk --private . \
          --package=dev.sijey.testapp \
          --name "Test App" \
          --version 0.1 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy,plyer,pyjnius,android \
          --arch=arm64-v8a \
          --arch=armeabi-v7a \
          --release \
          --ndk-dir=$ANDROIDNDK \
          --sdk-dir=$ANDROIDSDK \
          --android-api=$ANDROIDAPI \
          --minsdk=$NDKAPI \
          --color=always \
          --enable=sqlite3 \
          --copy-libs \
          --verbose

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: kivy-app-apk
        path: bin/*.apk
        if-no-files-found: error
        retention-days: 30

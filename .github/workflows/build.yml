name: Build Kivy APK (Docker Buildozer)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        run: |
          cd $GITHUB_WORKSPACE
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          sed -i 's/requirements = .*/requirements = python3==3.8.0,kivy==2.1.0/g' buildozer.spec
          sed -i 's/android.ndk = .*/android.ndk = 25b/g' buildozer.spec
          sed -i 's/android.sdk = .*/android.sdk = 33/g' buildozer.spec
          sed -i 's/android.build_tools_version = .*/android.build_tools_version = 33.0.2/g' buildozer.spec
          # Эмулируем ответ "y" через yes
          yes | buildozer -v android debug

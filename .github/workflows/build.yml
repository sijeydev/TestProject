name: Build Kivy APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git wget unzip \
          python3-pip python3-venv \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev \
          libtinfo5

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --user cython virtualenv
        pip install --user python-for-android

    - name: Install Android SDK manually
      run: |
        cd ${{ github.workspace }}
        
        # Скачиваем командную строку SDK
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        
        # Создаём структуру папок
        mkdir -p sdk/cmdline-tools
        mv cmdline-tools sdk/cmdline-tools/latest
        
        # Добавляем в PATH
        export PATH=$PATH:${{ github.workspace }}/sdk/cmdline-tools/latest/bin
        
        # Принимаем лицензии автоматически
        yes | sdkmanager --licenses
        
        # Устанавливаем NDK, платформы и инструменты
        sdkmanager "ndk;26.3.11579264" \
                   "platforms;android-33" \
                   "build-tools;33.0.2" \
                   "platform-tools" \
                   "cmake;3.22.1"
        
        # Сохраняем пути для следующих шагов
        echo "${{ github.workspace }}/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "${{ github.workspace }}/sdk/platform-tools" >> $GITHUB_PATH
        echo "ANDROIDSDK=${{ github.workspace }}/sdk" >> $GITHUB_ENV
        echo "ANDROIDNDK=${{ github.workspace }}/sdk/ndk/26.3.11579264" >> $GITHUB_ENV
        
        # Проверяем установку
        echo "SDK installed at: ${{ github.workspace }}/sdk"
        ls -la ${{ github.workspace }}/sdk/ndk/

    - name: Build APK with python-for-android
      env:
        ANDROIDSDK: ${{ github.workspace }}/sdk
        ANDROIDNDK: ${{ github.workspace }}/sdk/ndk/26.3.11579264
        ANDROIDAPI: 33
        NDKAPI: 21
      run: |
        p4a apk --private . \
          --package=org.example.myapp \
          --name "My Kivy App" \
          --version 0.1 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy,plyer,pyjnius,android \
          --arch=arm64-v8a \
          --arch=armeabi-v7a \
          --release \
          --ndk-dir=$ANDROIDNDK \
          --sdk-dir=$ANDROIDSDK \
          --android-api=$ANDROIDAPI \
          --minsdk=$NDKAPI \
          --color=always \
          --enable=sqlite3 \
          --copy-libs \
          --verbose

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: kivy-app-apk
        path: bin/*.apk
        if-no-files-found: error
        retention-days: 30

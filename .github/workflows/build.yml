name: Build Kivy APK (Official p4a style)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture'
        required: true
        default: 'arm64-v8a'
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - all

jobs:
  build:
    runs-on: ubuntu-22.04
    
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a]
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git wget unzip \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev \
          libtinfo5 ccache

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cython==0.29.36 virtualenv
        # Устанавливаем p4a из официального репозитория (develop branch)
        git clone https://github.com/kivy/python-for-android.git
        cd python-for-android
        pip install -e .
        cd ..

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708
        ndk-version: 25.2.9519653
        ndk-install-path: ${{ github.workspace }}/ndk
        sdk-install-path: ${{ github.workspace }}/sdk

    - name: Accept Android licenses
      run: |
        export PATH=$PATH:${{ github.workspace }}/sdk/cmdline-tools/latest/bin
        yes | sdkmanager --licenses

    - name: Build APK for ${{ matrix.arch }}
      env:
        ANDROIDSDK: ${{ github.workspace }}/sdk
        ANDROIDNDK: ${{ github.workspace }}/ndk/25.2.9519653
      run: |
        export PATH=$PATH:${{ github.workspace }}/sdk/cmdline-tools/latest/bin
        
        # Сборка с официальными параметрами [citation:2]
        p4a apk \
          --private . \
          --package=org.example.myapp \
          --name "My App" \
          --version 0.1 \
          --bootstrap=sdl2 \
          --requirements="python3==3.8.0,kivy==2.1.0" \
          --arch=${{ matrix.arch }} \
          --release \
          --ndk-dir=$ANDROIDNDK \
          --sdk-dir=$ANDROIDSDK \
          --android-api=33 \
          --minsdk=21 \
          --permission=INTERNET \
          --permission=WRITE_EXTERNAL_STORAGE \
          --add-source=. \
          --color=always \
          --debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: myapp-${{ matrix.arch }}
        path: bin/*.apk
        if-no-files-found: error
        retention-days: 30

name: Build Kivy APK (Docker Buildozer)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python 3.8 and dependencies
        run: |
          # Обновляем список пакетов
          apt-get update
          
          # Устанавливаем Python 3.8 и все необходимые модули
          # Сначала пробуем стандартный способ
          apt-get install -y python3.8 python3.8-dev python3.8-distutils || true
          
          # Если python3.8-venv не находится через APT, используем альтернативный метод
          # Скачиваем и устанавливаем ensurepip вручную
          python3.8 -m ensurepip --upgrade || true
          
          # Создаем symlink для python3.8
          update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.8 1
          
          # Проверяем версию
          python3 --version
          
          # Устанавливаем pip для Python 3.8
          python3.8 -m pip install --upgrade pip setuptools wheel

      - name: Build with Buildozer
        run: |
          cd $GITHUB_WORKSPACE
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          sed -i 's/requirements = .*/requirements = python3==3.8.0,kivy==2.1.0/g' buildozer.spec
          sed -i 's/android.ndk = .*/android.ndk = 25b/g' buildozer.spec
          sed -i 's/android.sdk = .*/android.sdk = 33/g' buildozer.spec
          sed -i 's/android.build_tools_version = .*/android.build_tools_version = 33.0.2/g' buildozer.spec
          sed -i 's/android.archs = .*/android.archs = arm64-v8a/g' buildozer.spec
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: myapp-apk
          path: ./bin/*.apk

name: Build Kivy APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system deps
      run: |
        sudo apt update
        sudo apt install -y git wget unzip python3-pip \
          autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev cmake \
          libffi-dev libssl-dev libtinfo5

    - name: –ü–ě–õ–Ě–ź–Į –ó–ź–ß–ė–°–Ę–ö–ź P4A
      run: |
        # –£–ī–į–Ľ—Ź–Ķ–ľ –≤—Ā—Ď, —á—ā–ĺ —Ā–≤—Ź–∑–į–Ĺ–ĺ —Ā p4a –ł pyjnius
        rm -rf ~/.local/share/python-for-android
        rm -rf ~/.local/lib/python3.9/site-packages/pythonforandroid
        rm -rf ~/.local/bin/p4a
        pip uninstall -y python-for-android cython virtualenv pyjnius || true
        
        # –£–ī–į–Ľ—Ź–Ķ–ľ jnius –ł–∑ –Ņ—Ä–ĺ–Ķ–ļ—ā–į –Ķ—Ā–Ľ–ł –Ķ—Ā—ā—Ć
        rm -rf ${{ github.workspace }}/jnius
        rm -rf ${{ github.workspace }}/pyjnius
        find ${{ github.workspace }} -name "*jnius*" -type d -exec rm -rf {} + 2>/dev/null || true

    - name: Install Python deps –ó–ź–Ě–ě–í–ě
      run: |
        pip install --user --upgrade pip
        pip install --user cython==0.29.36  # –°–Ę–ź–†–ź–Į –°–Ę–ź–Ď–ė–õ–¨–Ě–ź–Į –í–ē–†–°–ė–Į
        pip install --user virtualenv
        pip install --user python-for-android==2024.1.21

    - name: Setup Android SDK
      run: |
        cd ~
        rm -rf ~/android-sdk
        rm -rf ~/cmdline-tools
        
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -o commandlinetools-linux-11076708_latest.zip
        
        mkdir -p android-sdk/cmdline-tools
        mv cmdline-tools android-sdk/cmdline-tools/latest
        
        SDK_PATH=$(realpath ~/android-sdk)
        echo "SDK_PATH=$SDK_PATH" >> $GITHUB_ENV
        
        yes | ~/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        
        ~/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" \
                   "build-tools;33.0.2" \
                   "ndk;25.2.9519653" \
                   "platform-tools"
        
        echo "ANDROIDSDK=$SDK_PATH" >> $GITHUB_ENV
        echo "ANDROIDNDK=$SDK_PATH/ndk/25.2.9519653" >> $GITHUB_ENV
        echo "$SDK_PATH/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$SDK_PATH/platform-tools" >> $GITHUB_PATH

    - name: Build APK
      run: |
        # –ö–ě–°–Ę–ę–õ–¨ –Ē–õ–Į SDK
        mkdir -p $ANDROIDSDK/tools/bin
        ln -sf $ANDROIDSDK/cmdline-tools/latest/bin/sdkmanager $ANDROIDSDK/tools/bin/sdkmanager
        ln -sf $ANDROIDSDK/cmdline-tools/latest/bin/avdmanager $ANDROIDSDK/tools/bin/avdmanager
        
        # –ē–©–Ā –†–ź–ó –£–Ď–ē–Ė–Ē–ź–ē–ú–°–Į –ß–Ę–ě JNIUS –Ě–ē–Ę
        find ${{ github.workspace }} -name "jnius" -type d
        
        # –ß–ł—Ā—ā–ł–ľ –ļ—ć—ą
        rm -rf ~/.local/share/python-for-android/
        
        # –°–Ī–ĺ—Ä–ļ–į –° –ü–ě–õ–Ě–ę–ú –ė–ď–Ě–ě–†–ė–†–ě–í–ź–Ě–ė–ē–ú setup.py
        p4a apk --private . \
          --package=org.example.myapp \
          --name "My App" \
          --version 0.1 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy \
          --arch=arm64-v8a \
          --release \
          --ndk-dir=$ANDROIDNDK \
          --sdk-dir=$ANDROIDSDK \
          --android-api=33 \
          --minsdk=21 \
          --color=always \
          --sdk-manager-path=$ANDROIDSDK/tools/bin/sdkmanager \
          --ignore-setup-py \
          --no-deps

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: bin/*.apk

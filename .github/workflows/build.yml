name: Build Kivy APK (Docker Buildozer)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python and Buildozer
        run: |
          apt-get update
          apt-get install -y python3-pip python3-dev python3-venv
          pip3 install --upgrade pip
          pip3 install buildozer cython==0.29.36

      - name: Убиваем pyjnius
        run: |
          # Находим где лежат рецепты p4a
          P4A_DIR=$(python3 -c "import pythonforandroid.recipes; print(pythonforandroid.recipes.__path__[0])" 2>/dev/null || echo "")
          if [ -n "$P4A_DIR" ]; then
            echo "P4A recipes at: $P4A_DIR"
            rm -rf $P4A_DIR/pyjnius
            echo "✅ pyjnius удалён"
          else
            echo "ℹ️ Рецепты не найдены (будет позже)"
          fi

      - name: Build with Buildozer
        run: |
          cd $GITHUB_WORKSPACE
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          sed -i 's/requirements = .*/requirements = python3,kivy==2.1.0/g' buildozer.spec
          sed -i 's/android.ndk = .*/android.ndk = 25b/g' buildozer.spec
          sed -i 's/android.sdk = .*/android.sdk = 33/g' buildozer.spec
          sed -i 's/android.build_tools_version = .*/android.build_tools_version = 33.0.2/g' buildozer.spec
          sed -i 's/android.archs = .*/android.archs = arm64-v8a/g' buildozer.spec
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: myapp-apk
          path: ./bin/*.apk

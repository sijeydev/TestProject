name: Build with Buildozer

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.8'
      - run: |
          pip install --user buildozer cython==0.29.36
          buildozer android debug
      - uses: actions/upload-artifact@v4
        with:
          path: bin/*.apk

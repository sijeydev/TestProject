name: Build Kivy APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Удаляем глобальный NDK
      run: |
        sudo rm -rf /usr/local/lib/android/sdk/ndk
        sudo rm -rf /usr/local/lib/android/sdk/ndk-bundle

    - name: Ставим p4a и ломаем рецепт jnius
      run: |
        pip install --user --upgrade pip
        pip install --user cython virtualenv
        pip install --user python-for-android
        
        # Находим где лежит рецепт pyjnius и удаляем его нафиг
        P4A_DIR=$(python -c "import pythonforandroid.recipes; print(pythonforandroid.recipes.__path__[0])")
        echo "P4A recipes at: $P4A_DIR"
        rm -rf $P4A_DIR/pyjnius
        echo "Рецепт pyjnius удалён!"

    - name: Качаем SDK и NDK
      run: |
        mkdir -p ~/android-sdk
        cd ~/android-sdk
        
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
        
        wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
        unzip -q android-ndk-r25b-linux.zip

    - name: Принимаем лицензии
      run: |
        cd ~/android-sdk
        yes | ./cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$HOME/android-sdk

    - name: Ставим платформы
      run: |
        cd ~/android-sdk
        ./cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.2" --sdk_root=$HOME/android-sdk

    - name: Патчим Kivy (убираем long)
      run: |
        # Ждём пока появится файл (до 60 секунд)
        for i in {1..12}; do
          KIVY_PYX=$(find ~/.local/share/python-for-android/build/ -name "weakproxy.pyx" 2>/dev/null | head -1)
          if [ -n "$KIVY_PYX" ]; then
            echo "✅ Найден weakproxy.pyx: $KIVY_PYX"
            sed -i 's/return long(/return int(/g' "$KIVY_PYX"
            echo "✅ Патч применён"
            break
          fi
          echo "⏳ Ожидание файла... ($i/12)"
          sleep 5
        done

    - name: Сборка APK
      env:
        ANDROIDSDK: /home/runner/android-sdk
        ANDROIDNDK: /home/runner/android-sdk/android-ndk-r25b
      run: |
        # ФИНАЛЬНАЯ ЗАЧИСТКА
        rm -rf ~/.local/share/python-for-android/dists/
        
        p4a apk --private . \
          --package=org.example.myapp \
          --name "My App" \
          --version 0.1 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy \
          --arch=arm64-v8a \
          --release \
          --ndk-dir=$ANDROIDNDK \
          --sdk-dir=$ANDROIDSDK \
          --android-api=33 \
          --minsdk=21

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: bin/*.apk
